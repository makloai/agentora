name: Release

on:
  push:
    branches: [main]

# Don't let two release runs publish at once.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the Version Packages PR / tags
  pull-requests: write # open/update the Version Packages PR
  id-token: write # OIDC for npm Trusted Publishing (auth + provenance)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org
      # Trusted Publishing needs npm CLI >= 11.5.1; Node 20/22 bundle an older npm.
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      # When changesets exist, opens/updates a "Version Packages" PR. When that PR
      # merges (no changesets left, only version bumps), publishes to npm — no
      # NPM_TOKEN: authentication and provenance come from OIDC Trusted Publishing.
      - uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
